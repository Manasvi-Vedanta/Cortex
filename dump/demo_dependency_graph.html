
<!DOCTYPE html>
<html>
<head>
    <title>Learning Path Dependency Graph</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
        }
        #mynetwork {
            width: 100%;
            height: 600px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .metrics {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .metric {
            display: inline-block;
            margin-right: 30px;
        }
        .metric-label {
            font-weight: bold;
            color: #666;
        }
        .metric-value {
            font-size: 1.5em;
            color: #2196F3;
        }
        .legend {
            background: white;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
        }
        .legend-item {
            display: inline-block;
            margin-right: 20px;
        }
        .legend-color {
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-right: 5px;
            vertical-align: middle;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 Learning Path Dependency Graph</h1>
        
        <div class="metrics">
            <div class="metric">
                <div class="metric-label">Total Sessions</div>
                <div class="metric-value">5</div>
            </div>
            <div class="metric">
                <div class="metric-label">Dependencies</div>
                <div class="metric-value">5</div>
            </div>
            <div class="metric">
                <div class="metric-label">Independent Sessions</div>
                <div class="metric-value">1</div>
            </div>
            <div class="metric">
                <div class="metric-label">Complexity Score</div>
                <div class="metric-value">1.00</div>
            </div>
        </div>
        
        <div class="legend">
            <strong>Difficulty Levels:</strong>
            <div class="legend-item">
                <span class="legend-color" style="background: #4CAF50;"></span>
                Beginner
            </div>
            <div class="legend-item">
                <span class="legend-color" style="background: #FF9800;"></span>
                Intermediate
            </div>
            <div class="legend-item">
                <span class="legend-color" style="background: #F44336;"></span>
                Advanced
            </div>
        </div>
        
        <div id="mynetwork"></div>
    </div>
    
    <script type="text/javascript">
        var nodes = new vis.DataSet([
  {
    "id": "session_1",
    "label": "Python Fundamentals",
    "session_number": 1,
    "skills_count": 4,
    "duration_hours": 25,
    "difficulty": "beginner",
    "color": "#4CAF50"
  },
  {
    "id": "session_2",
    "label": "Object-Oriented Programming",
    "session_number": 2,
    "skills_count": 4,
    "duration_hours": 30,
    "difficulty": "intermediate",
    "color": "#FF9800"
  },
  {
    "id": "session_3",
    "label": "Data Structures & Algorithms",
    "session_number": 3,
    "skills_count": 4,
    "duration_hours": 35,
    "difficulty": "intermediate",
    "color": "#FF9800"
  },
  {
    "id": "session_4",
    "label": "Web Development with Flask",
    "session_number": 4,
    "skills_count": 3,
    "duration_hours": 40,
    "difficulty": "advanced",
    "color": "#F44336"
  },
  {
    "id": "session_5",
    "label": "Machine Learning Basics",
    "session_number": 5,
    "skills_count": 4,
    "duration_hours": 50,
    "difficulty": "advanced",
    "color": "#F44336"
  }
]);
        
        var edges = new vis.DataSet([
  {
    "from": "session_1",
    "to": "session_2",
    "label": "requires"
  },
  {
    "from": "session_2",
    "to": "session_3",
    "label": "requires"
  },
  {
    "from": "session_3",
    "to": "session_4",
    "label": "requires"
  },
  {
    "from": "session_3",
    "to": "session_5",
    "label": "requires"
  },
  {
    "from": "session_1",
    "to": "session_5",
    "label": "requires"
  }
]);
        
        var container = document.getElementById('mynetwork');
        var data = {
            nodes: nodes,
            edges: edges
        };
        
        var options = {
            nodes: {
                shape: 'box',
                margin: 10,
                widthConstraint: {
                    maximum: 200
                },
                font: {
                    size: 14,
                    color: '#ffffff'
                }
            },
            edges: {
                arrows: {
                    to: {
                        enabled: true,
                        scaleFactor: 0.5
                    }
                },
                smooth: {
                    type: 'cubicBezier'
                },
                color: {
                    color: '#848484',
                    highlight: '#2196F3'
                }
            },
            layout: {
                hierarchical: {
                    direction: 'UD',
                    sortMethod: 'directed',
                    levelSeparation: 150,
                    nodeSpacing: 200
                }
            },
            physics: false
        };
        
        var network = new vis.Network(container, data, options);
        
        network.on("click", function(params) {
            if (params.nodes.length > 0) {
                var nodeId = params.nodes[0];
                var node = nodes.get(nodeId);
                alert('Session: ' + node.label + '\n' +
                      'Skills: ' + node.skills_count + '\n' +
                      'Duration: ' + node.duration_hours + ' hours\n' +
                      'Difficulty: ' + node.difficulty);
            }
        });
    </script>
</body>
</html>
